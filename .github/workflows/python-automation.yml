name: sap automation on github
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  sap_run:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: set-up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: install dependencies
        run:
          python -m pip install --upgrade pip
          pip install selenium pytest
      - name: run selenium tests
        run:
           pytest --headlesstrue
        env:
            PYTHONPATH: .


            # If your script needs environment variables, add them here








